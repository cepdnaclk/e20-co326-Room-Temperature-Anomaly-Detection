version: "3.8"

services:
  # ── MQTT Broker ──────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ── Node-RED Dashboard ───────────────────────────────────────────────────────
  node-red:
    image: nodered/node-red:3
    container_name: node-red
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - "1880:1880"
    environment:
      - TZ=Asia/Colombo
    volumes:
      - node_red_data:/data
      - ./node-red/flows.json:/data/flows.json:ro

  # ── Python Edge-AI Container ─────────────────────────────────────────────────
  edge-ai:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: edge-ai
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mosquitto_data:
  mosquitto_log:
  node_red_data:
